<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Asistencia QR</title>

  <link rel="stylesheet" href="./style.css">


  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0b2e4a">


  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

  <h1>Control de Asistencia</h1>


  <div id="login">
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="login()">Iniciar sesión</button>
  </div>

  <div id="app" style="display:none;">

    <div class="fecha-container">
      <label>📅 Fecha de asistencia:</label>
      <input type="date" id="fecha">
    </div>

    <div id="reader"></div>

    <h2>Lista de Estudiantes</h2>

    <table id="tabla">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Correo</th>
          <th>Programa</th>
          <th>Asistencia</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="botones">
      <button onclick="exportar()">📊 Exportar Excel</button>
      <button onclick="modificarFecha()">🖊 Modificar fecha</button>
      <button onclick="borrarDatosFecha()">🗑 Borrar datos</button>
    </div>

  </div>


  <script type="module" src="./app.js"></script>


  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then((reg) => {
            console.log("✅ Service Worker activo:", reg.scope);
          })
          .catch((err) => {
            console.error("❌ Error SW:", err);
          });
      });
    }
  </script>

</body>
</html>
