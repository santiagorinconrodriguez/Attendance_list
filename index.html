<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asistencia QR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>📋 Control de Asistencia</h1>

  <!-- FECHA -->
  <div class="fecha-container">
    <label>📅 Fecha de asistencia:</label>
    <input type="date" id="fecha">
    <button onclick="agregarFecha()">➕ Nueva fecha</button>
  </div>

  <!-- ACCESO BASE DE DATOS -->
  <div class="fecha-container">
    <label>📂 Abrir base de datos Excel:</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <button onclick="guardarExcel()">💾 Guardar cambios en Excel</button>
  </div>

  <!-- ESCANER -->
  <div id="reader"></div>

  <!-- TABLA -->
  <h2>Lista de Estudiantes (Fecha seleccionada)</h2>
  <table id="tabla">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Correo</th>
        <th>Programa</th>
        <th>Asistencia (doble click para cambiar)</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<!-- BOTONES -->
<div class="botones">
  <button onclick="exportar()">📊 Exportar Excel</button>
  <button onclick="modificarFecha()">🖊 Modificar fecha</button>
  <button onclick="borrarDatosFecha()">🗑 Borrar datos de la fecha</button>
</div>


  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
